name: validate

on:
  pull_request:
    paths:
      - '*.json'
      - 'scripts/lint-guide.mjs'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - '*.json'

jobs:
  lint:
    name: Lint guide JSONs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff against main and find changed files on PRs.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine changed guides
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA" HEAD -- '*.json' | grep -v '^index\.json$' | grep -v '^package' || true)
          else
            FILES=$(ls *.json 2>/dev/null | grep -v '^index\.json$' | grep -v '^package' || true)
          fi
          echo "Files to lint:"
          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run linter
        if: steps.changed.outputs.files != ''
        run: |
          set -e
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No guide files changed."
            exit 0
          fi
          # shellcheck disable=SC2086
          node scripts/lint-guide.mjs $FILES

      - name: No changes
        if: steps.changed.outputs.files == ''
        run: echo "No guide JSONs changed in this PR — nothing to lint."
